<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>520 - 暖心留言板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="petals-container" id="petalsContainer"></div>

    <div class="message-page">
        <a href="index.html" class="msg-back">&larr;</a>

        <div class="msg-header">
            <h1 class="msg-title">520 暖心留言板</h1>
            <p class="msg-subtitle">写下想对TA说的话</p>
        </div>

        <div class="msg-input-area">
            <textarea id="msgTextarea" class="msg-textarea" placeholder="写下你的心里话..." maxlength="500"></textarea>
            <div class="msg-sender">
                <select id="msgSenderSelect" class="sender-select">
                    <option value="青云">青云</option>
                    <option value="雅清">雅清</option>
                </select>
                <button id="msgSendBtn" class="msg-send-btn">发送</button>
            </div>
        </div>

        <div class="msg-list">
            <div class="msg-list-title">~ 历史暖心留言 ~</div>
            <div id="msgList"></div>
        </div>

        <footer class="footer">
            <p>Made with ♥ for us</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
